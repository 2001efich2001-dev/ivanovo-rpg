<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Исправление данных игроков</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #fff; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #4caf50; color: white; border: none; border-radius: 8px; }
        button:hover { opacity: 0.8; }
        pre { background: #2d2d2d; padding: 15px; border-radius: 8px; overflow-x: auto; max-height: 400px; }
        .log { margin-top: 20px; max-height: 600px; overflow-y: auto; }
        .success { color: #4caf50; }
        .error { color: #f44336; }
        .warning { color: #ff9800; }
        .info { color: #2196f3; }
        .stats { 
            background: #2d2d2d; 
            padding: 15px; 
            border-radius: 8px; 
            margin-bottom: 15px;
            border-left: 4px solid #4caf50;
        }
        .stats span { color: #ffd966; font-weight: bold; }
        .progress-bar {
            width: 100%;
            height: 20px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4caf50, #8bc34a);
            transition: width 0.3s ease;
            width: 0%;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <h2>🔧 Исправление данных игроков</h2>
    <p>Скрипт проверит всех игроков в коллекции <code>users</code> и добавит недостающие поля <code>level</code> и <code>experience</code>.</p>
    
    <div style="margin: 15px 0;">
        <button id="fixBtn">🚀 Запустить исправление</button>
        <button id="checkBtn" style="background: #2196f3; margin-left: 10px;">🔍 Проверить без изменений</button>
    </div>
    
    <div id="stats" class="stats" style="display: none;">
        <div>📊 Всего игроков: <span id="totalPlayers">0</span></div>
        <div>✅ Игроков с корректными данными: <span id="validPlayers">0</span></div>
        <div>🔧 Исправлено игроков: <span id="fixedPlayers">0</span></div>
        <div>⚠️ С ошибками: <span id="errorPlayers">0</span></div>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
    </div>
    
    <div id="log" class="log"></div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js';
        import { getFirestore, collection, getDocs, updateDoc, doc } from 'https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js';
        import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js';
        
        const firebaseConfig = {
            apiKey: "AIzaSyCB2rBhMavOvxrd2Wox967_Xm23_oSMX8Y",
            authDomain: "ivanovo-a6770.firebaseapp.com",
            projectId: "ivanovo-a6770",
            storageBucket: "ivanovo-a6770.firebasestorage.app",
            messagingSenderId: "5386313391",
            appId: "1:5386313391:web:8ee5528233044dd1603e5a"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        const logDiv = document.getElementById('log');
        const statsDiv = document.getElementById('stats');
        const totalSpan = document.getElementById('totalPlayers');
        const validSpan = document.getElementById('validPlayers');
        const fixedSpan = document.getElementById('fixedPlayers');
        const errorSpan = document.getElementById('errorPlayers');
        const progressFill = document.getElementById('progressFill');
        
        let isProcessing = false;
        
        function addLog(message, type = 'info') {
            const p = document.createElement('div');
            p.textContent = message;
            p.className = type;
            logDiv.appendChild(p);
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(message);
        }
        
        function updateProgress(percent) {
            progressFill.style.width = Math.min(100, percent) + '%';
        }
        
        function updateStats(total, valid, fixed, errors) {
            totalSpan.textContent = total;
            validSpan.textContent = valid;
            fixedSpan.textContent = fixed;
            errorSpan.textContent = errors;
            statsDiv.style.display = 'block';
        }
        
        async function processPlayers(shouldFix = false) {
            if (isProcessing) {
                addLog('⚠️ Процесс уже запущен, подождите...', 'warning');
                return;
            }
            
            isProcessing = true;
            logDiv.innerHTML = '';
            statsDiv.style.display = 'none';
            document.getElementById('fixBtn').disabled = true;
            document.getElementById('checkBtn').disabled = true;
            
            addLog('🔐 Проверка авторизации...', 'info');
            
            onAuthStateChanged(auth, async (user) => {
                if (!user) {
                    addLog('❌ Авторизуйтесь в игре сначала! Откройте игру и войдите, затем обновите эту страницу.', 'error');
                    isProcessing = false;
                    document.getElementById('fixBtn').disabled = false;
                    document.getElementById('checkBtn').disabled = false;
                    return;
                }
                
                addLog(`✅ Авторизован как: ${user.email}`, 'success');
                addLog(`📦 ${shouldFix ? '🔧 ИСПРАВЛЕНИЕ' : '🔍 ПРОВЕРКА'} данных игроков...`, 'info');
                
                try {
                    const usersRef = collection(db, 'users');
                    const snapshot = await getDocs(usersRef);
                    
                    if (snapshot.empty) {
                        addLog('❌ Нет документов в коллекции users', 'error');
                        isProcessing = false;
                        document.getElementById('fixBtn').disabled = false;
                        document.getElementById('checkBtn').disabled = false;
                        return;
                    }
                    
                    const total = snapshot.size;
                    let valid = 0;
                    let fixed = 0;
                    let errors = 0;
                    let processed = 0;
                    
                    addLog(`📊 Найдено документов: ${total}`, 'info');
                    updateStats(total, 0, 0, 0);
                    
                    for (const docSnap of snapshot.docs) {
                        const userId = docSnap.id;
                        const data = docSnap.data();
                        const userRef = doc(db, 'users', userId);
                        const updates = {};
                        
                        let needsFix = false;
                        let reason = '';
                        
                        // Проверяем поле level
                        if (data.level === undefined || data.level === null) {
                            updates.level = 1;
                            needsFix = true;
                            reason += 'level отсутствует; ';
                        } else if (typeof data.level !== 'number' || isNaN(data.level)) {
                            updates.level = 1;
                            needsFix = true;
                            reason += 'level не число; ';
                        }
                        
                        // Проверяем поле experience
                        if (data.experience === undefined || data.experience === null) {
                            updates.experience = 0;
                            needsFix = true;
                            reason += 'experience отсутствует; ';
                        } else if (typeof data.experience !== 'number' || isNaN(data.experience)) {
                            updates.experience = 0;
                            needsFix = true;
                            reason += 'experience не число; ';
                        }
                        
                        // Проверяем поле money (опционально, но полезно)
                        if (data.money === undefined || data.money === null) {
                            updates.money = 500;
                            needsFix = true;
                            reason += 'money отсутствует; ';
                        } else if (typeof data.money !== 'number' || isNaN(data.money)) {
                            updates.money = 500;
                            needsFix = true;
                            reason += 'money не число; ';
                        }
                        
                        // Проверяем поле displayName (опционально)
                        if (!data.displayName) {
                            updates.displayName = `Игрок_${userId.slice(0, 6)}`;
                            needsFix = true;
                            reason += 'displayName отсутствует; ';
                        }
                        
                        processed++;
                        updateProgress((processed / total) * 100);
                        
                        if (needsFix) {
                            if (shouldFix) {
                                try {
                                    await updateDoc(userRef, updates);
                                    fixed++;
                                    const fixedFields = Object.keys(updates).join(', ');
                                    addLog(`✅ ${userId.slice(0, 10)}... исправлен: ${fixedFields} (${reason})`, 'success');
                                } catch (err) {
                                    errors++;
                                    addLog(`❌ ${userId.slice(0, 10)}... ошибка: ${err.message}`, 'error');
                                }
                            } else {
                                // Режим проверки — просто логируем
                                addLog(`🔍 ${userId.slice(0, 10)}... требует исправления: ${reason}`, 'warning');
                            }
                        } else {
                            valid++;
                            // Если в режиме проверки, пишем только каждые 10 игроков, чтобы не засорять лог
                            if (valid % 10 === 0 || !shouldFix) {
                                addLog(`✅ ${userId.slice(0, 10)}... данные корректны`, 'success');
                            }
                        }
                        
                        // Обновляем статистику каждые 5 игроков
                        if (processed % 5 === 0) {
                            updateStats(total, valid, fixed, errors);
                        }
                    }
                    
                    // Финальная статистика
                    updateStats(total, valid, fixed, errors);
                    
                    addLog(`\n📊 ИТОГО:`, 'info');
                    addLog(`   ✅ Всего игроков: ${total}`, 'info');
                    addLog(`   ✅ Корректных: ${valid}`, 'success');
                    if (shouldFix) {
                        addLog(`   🔧 Исправлено: ${fixed}`, 'success');
                    } else {
                        addLog(`   ⚠️ Требуют исправления: ${total - valid}`, 'warning');
                    }
                    addLog(`   ❌ С ошибками: ${errors}`, errors > 0 ? 'error' : 'success');
                    
                    if (shouldFix && fixed > 0) {
                        addLog(`\n🎉 ГОТОВО! Исправлено ${fixed} игроков. Обнови топ, чтобы увидеть всех!`, 'success');
                    } else if (!shouldFix && total - valid > 0) {
                        addLog(`\n🔧 Нажми "Запустить исправление", чтобы автоматически добавить недостающие поля.`, 'warning');
                    } else if (shouldFix && fixed === 0) {
                        addLog(`\n✅ Все игроки уже имеют корректные данные!`, 'success');
                    }
                    
                } catch (error) {
                    addLog(`❌ Ошибка: ${error.message}`, 'error');
                    console.error(error);
                }
                
                isProcessing = false;
                document.getElementById('fixBtn').disabled = false;
                document.getElementById('checkBtn').disabled = false;
                updateProgress(100);
            });
        }
        
        document.getElementById('checkBtn').addEventListener('click', async () => {
            await processPlayers(false);
        });
        
        document.getElementById('fixBtn').addEventListener('click', async () => {
            if (confirm('⚠️ ВНИМАНИЕ! Скрипт добавит поля level, experience, money и displayName всем игрокам, у которых они отсутствуют. Продолжить?')) {
                await processPlayers(true);
            }
        });
    </script>
</body>
</html>
