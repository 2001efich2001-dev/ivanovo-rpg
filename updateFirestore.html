<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Добавление роли игрокам</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #fff; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #4caf50; color: white; border: none; border-radius: 8px; }
        button:hover { opacity: 0.8; }
        .log { margin-top: 20px; max-height: 600px; overflow-y: auto; }
        .success { color: #4caf50; }
        .error { color: #f44336; }
        .warning { color: #ff9800; }
        .info { color: #2196f3; }
        .stats {
            background: #2d2d2d;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #4caf50;
        }
        .stats span { color: #ffd966; font-weight: bold; }
        .progress-bar {
            width: 100%;
            height: 20px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4caf50, #8bc34a);
            transition: width 0.3s ease;
            width: 0%;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <h2>👤 Добавление поля role игрокам</h2>
    <p>Скрипт проверит всех игроков и добавит поле <code>role: 'user'</code> всем, у кого оно отсутствует.</p>

    <div style="margin: 15px 0;">
        <button id="addBtn">🚀 Добавить поле role</button>
        <button id="checkBtn" style="background: #2196f3; margin-left: 10px;">🔍 Проверить</button>
    </div>

    <div id="stats" class="stats" style="display: none;">
        <div>📊 Всего игроков: <span id="totalPlayers">0</span></div>
        <div>✅ Уже есть role: <span id="hasRole">0</span></div>
        <div>🔧 Добавлено role: <span id="addedRole">0</span></div>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
    </div>

    <div id="log" class="log"></div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js';
        import { getFirestore, collection, getDocs, updateDoc, doc } from 'https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js';
        import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js';

        const firebaseConfig = {
            apiKey: "AIzaSyCB2rBhMavOvxrd2Wox967_Xm23_oSMX8Y",
            authDomain: "ivanovo-a6770.firebaseapp.com",
            projectId: "ivanovo-a6770",
            storageBucket: "ivanovo-a6770.firebasestorage.app",
            messagingSenderId: "5386313391",
            appId: "1:5386313391:web:8ee5528233044dd1603e5a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const logDiv = document.getElementById('log');
        const statsDiv = document.getElementById('stats');
        const totalSpan = document.getElementById('totalPlayers');
        const hasRoleSpan = document.getElementById('hasRole');
        const addedRoleSpan = document.getElementById('addedRole');
        const progressFill = document.getElementById('progressFill');

        let isProcessing = false;

        function addLog(message, type = 'info') {
            const p = document.createElement('div');
            p.textContent = message;
            p.className = type;
            logDiv.appendChild(p);
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(message);
        }

        function updateProgress(percent) {
            progressFill.style.width = Math.min(100, percent) + '%';
        }

        function updateStats(total, hasRole, addedRole) {
            totalSpan.textContent = total;
            hasRoleSpan.textContent = hasRole;
            addedRoleSpan.textContent = addedRole;
            statsDiv.style.display = 'block';
        }

        async function processPlayers(shouldAdd = false) {
            if (isProcessing) {
                addLog('⚠️ Процесс уже запущен, подождите...', 'warning');
                return;
            }

            isProcessing = true;
            logDiv.innerHTML = '';
            statsDiv.style.display = 'none';
            document.getElementById('addBtn').disabled = true;
            document.getElementById('checkBtn').disabled = true;

            addLog('🔐 Проверка авторизации...', 'info');

            onAuthStateChanged(auth, async (user) => {
                if (!user) {
                    addLog('❌ Авторизуйтесь в игре сначала! Откройте игру и войдите, затем обновите эту страницу.', 'error');
                    isProcessing = false;
                    document.getElementById('addBtn').disabled = false;
                    document.getElementById('checkBtn').disabled = false;
                    return;
                }

                addLog(`✅ Авторизован как: ${user.email}`, 'success');
                addLog(`📦 ${shouldAdd ? '🔧 ДОБАВЛЕНИЕ' : '🔍 ПРОВЕРКА'} поля role...`, 'info');

                try {
                    const usersRef = collection(db, 'users');
                    const snapshot = await getDocs(usersRef);

                    if (snapshot.empty) {
                        addLog('❌ Нет документов в коллекции users', 'error');
                        isProcessing = false;
                        document.getElementById('addBtn').disabled = false;
                        document.getElementById('checkBtn').disabled = false;
                        return;
                    }

                    const total = snapshot.size;
                    let hasRole = 0;
                    let addedRole = 0;
                    let processed = 0;

                    addLog(`📊 Найдено документов: ${total}`, 'info');
                    updateStats(total, 0, 0);

                    for (const docSnap of snapshot.docs) {
                        const userId = docSnap.id;
                        const data = docSnap.data();
                        const userRef = doc(db, 'users', userId);

                        processed++;
                        updateProgress((processed / total) * 100);

                        // Проверяем наличие поля role
                        if (data.role !== undefined && data.role !== null) {
                            hasRole++;
                            addLog(`✅ ${userId.slice(0, 10)}... уже есть role: ${data.role}`, 'success');
                        } else {
                            if (shouldAdd) {
                                try {
                                    await updateDoc(userRef, { role: 'user' });
                                    addedRole++;
                                    addLog(`🔧 ${userId.slice(0, 10)}... добавлено role: user`, 'success');
                                } catch (err) {
                                    addLog(`❌ ${userId.slice(0, 10)}... ошибка: ${err.message}`, 'error');
                                }
                            } else {
                                addLog(`🔍 ${userId.slice(0, 10)}... требует добавления role`, 'warning');
                            }
                        }

                        // Обновляем статистику каждые 5 игроков
                        if (processed % 5 === 0) {
                            updateStats(total, hasRole, addedRole);
                        }
                    }

                    // Финальная статистика
                    updateStats(total, hasRole, addedRole);

                    addLog(`\n📊 ИТОГО:`, 'info');
                    addLog(`   ✅ Всего игроков: ${total}`, 'info');
                    addLog(`   ✅ Уже есть role: ${hasRole}`, 'success');
                    if (shouldAdd) {
                        addLog(`   🔧 Добавлено role: ${addedRole}`, 'success');
                    } else {
                        addLog(`   ⚠️ Требуют добавления: ${total - hasRole}`, 'warning');
                    }

                    if (shouldAdd && addedRole > 0) {
                        addLog(`\n🎉 ГОТОВО! Добавлено поле role ${addedRole} игрокам.`, 'success');
                    } else if (!shouldAdd && total - hasRole > 0) {
                        addLog(`\n🔧 Нажми "Добавить поле role", чтобы добавить его всем игрокам.`, 'warning');
                    } else if (shouldAdd && addedRole === 0) {
                        addLog(`\n✅ Все игроки уже имеют поле role!`, 'success');
                    }

                } catch (error) {
                    addLog(`❌ Ошибка: ${error.message}`, 'error');
                    console.error(error);
                }

                isProcessing = false;
                document.getElementById('addBtn').disabled = false;
                document.getElementById('checkBtn').disabled = false;
                updateProgress(100);
            });
        }

        document.getElementById('checkBtn').addEventListener('click', async () => {
            await processPlayers(false);
        });

        document.getElementById('addBtn').addEventListener('click', async () => {
            if (confirm('⚠️ ВНИМАНИЕ! Скрипт добавит поле role: "user" всем игрокам, у которых оно отсутствует. Продолжить?')) {
                await processPlayers(true);
            }
        });
    </script>
</body>
</html>
