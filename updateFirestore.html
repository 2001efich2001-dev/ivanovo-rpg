<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Инициализация мандатов</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #fff; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #4caf50; color: white; border: none; border-radius: 8px; }
        button:hover { opacity: 0.8; }
        .log { margin-top: 20px; max-height: 600px; overflow-y: auto; }
        .success { color: #4caf50; }
        .error { color: #f44336; }
        .warning { color: #ff9800; }
        .info { color: #2196f3; }
        .stats {
            background: #2d2d2d;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #4caf50;
        }
        .stats span { color: #ffd966; font-weight: bold; }
        .progress-bar {
            width: 100%;
            height: 20px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4caf50, #8bc34a);
            transition: width 0.3s ease;
            width: 0%;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <h2>🏛️ Инициализация мандатов</h2>
    <p>Скрипт создаст коллекцию <code>mandates</code> с 20 документами (мандаты с 1 по 20).</p>
    <p style="color: #ffd966; font-size: 0.9rem;">📝 Коллекция <code>candidates</code> будет создаваться автоматически при выдвижении игроков.</p>

    <div style="margin: 15px 0;">
        <button id="initBtn">🚀 Создать мандаты</button>
        <button id="checkBtn" style="background: #2196f3; margin-left: 10px;">🔍 Проверить</button>
        <button id="clearBtn" style="background: #e74c3c; margin-left: 10px;">🗑️ Очистить</button>
    </div>

    <div id="stats" class="stats" style="display: none;">
        <div>📊 Мандатов: <span id="mandatesCount">0</span> / 20</div>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
    </div>

    <div id="log" class="log"></div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js';
        import { getFirestore, collection, getDocs, doc, setDoc, getDoc, deleteDoc } from 'https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js';
        import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js';

        const firebaseConfig = {
            apiKey: "AIzaSyCB2rBhMavOvxrd2Wox967_Xm23_oSMX8Y",
            authDomain: "ivanovo-a6770.firebaseapp.com",
            projectId: "ivanovo-a6770",
            storageBucket: "ivanovo-a6770.firebasestorage.app",
            messagingSenderId: "5386313391",
            appId: "1:5386313391:web:8ee5528233044dd1603e5a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const logDiv = document.getElementById('log');
        const statsDiv = document.getElementById('stats');
        const mandatesSpan = document.getElementById('mandatesCount');
        const progressFill = document.getElementById('progressFill');

        let isProcessing = false;

        function addLog(message, type = 'info') {
            const p = document.createElement('div');
            p.textContent = message;
            p.className = type;
            logDiv.appendChild(p);
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(message);
        }

        function updateProgress(percent) {
            progressFill.style.width = Math.min(100, percent) + '%';
        }

        function updateStats(count) {
            mandatesSpan.textContent = count;
            statsDiv.style.display = 'block';
        }

        async function createMandates() {
            addLog('📦 Создание мандатов (1-20)...', 'info');
            
            let created = 0;
            let existing = 0;
            const total = 20;
            
            for (let i = 1; i <= total; i++) {
                const mandateId = `mandate_${i}`;
                const mandateRef = doc(db, 'mandates', mandateId);
                const mandateSnap = await getDoc(mandateRef);
                
                if (!mandateSnap.exists()) {
                    const isPurchasable = i >= 11;
                    await setDoc(mandateRef, {
                        id: mandateId,
                        number: i,
                        ownerId: null,
                        ownerName: null,
                        type: isPurchasable ? 'purchasable' : 'elected',
                        acquiredAt: null,
                        expiresAt: null,
                        isActive: false,
                        price: 1000000,
                        createdAt: new Date().toISOString()
                    });
                    created++;
                    addLog(`   ✅ Создан ${mandateId} (${isPurchasable ? '💳 покупной' : '🗳️ выборный'})`, 'success');
                } else {
                    existing++;
                }
                
                updateProgress((i / total) * 100);
            }
            
            addLog(`📊 Мандаты: создано ${created}, уже существовало ${existing}`, 'info');
            updateStats(created + existing);
            return { created, existing };
        }

        async function checkAll() {
            addLog('🔍 Проверка состояния...', 'info');
            
            const mandatesSnapshot = await getDocs(collection(db, 'mandates'));
            const mandatesCount = mandatesSnapshot.size;
            
            // Показываем список
            let html = '<div style="margin-top: 10px; font-size: 0.9rem;">';
            for (const docSnap of mandatesSnapshot.docs) {
                const data = docSnap.data();
                const status = data.ownerId ? `👤 ${data.ownerName}` : '📭 Свободен';
                html += `<div>📋 ${docSnap.id} → ${status} (${data.type === 'elected' ? '🗳️' : '💳'})</div>`;
            }
            html += '</div>';
            
            addLog(`📊 Всего мандатов: ${mandatesCount} / 20`, mandatesCount === 20 ? 'success' : 'warning');
            updateStats(mandatesCount);
            
            return mandatesCount;
        }

        async function clearAll() {
            if (!confirm('⚠️ УДАЛИТЬ ВСЕ МАНДАТЫ? Это действие необратимо!')) return;
            
            addLog('🗑️ Очистка...', 'warning');
            
            const snapshot = await getDocs(collection(db, 'mandates'));
            let deleted = 0;
            for (const docSnap of snapshot.docs) {
                await deleteDoc(docSnap.ref);
                deleted++;
            }
            
            addLog(`✅ Удалено ${deleted} мандатов`, 'success');
            updateStats(0);
        }

        document.getElementById('initBtn').addEventListener('click', async () => {
            if (isProcessing) return;
            isProcessing = true;
            logDiv.innerHTML = '';
            try {
                await createMandates();
            } catch (e) { addLog(`❌ ${e.message}`, 'error'); }
            isProcessing = false;
        });

        document.getElementById('checkBtn').addEventListener('click', async () => {
            if (isProcessing) return;
            isProcessing = true;
            logDiv.innerHTML = '';
            try {
                await checkAll();
            } catch (e) { addLog(`❌ ${e.message}`, 'error'); }
            isProcessing = false;
        });

        document.getElementById('clearBtn').addEventListener('click', async () => {
            if (isProcessing) return;
            isProcessing = true;
            logDiv.innerHTML = '';
            try {
                await clearAll();
            } catch (e) { addLog(`❌ ${e.message}`, 'error'); }
            isProcessing = false;
        });

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                addLog(`✅ Авторизован как: ${user.email}`, 'success');
                setTimeout(async () => {
                    try {
                        await checkAll();
                    } catch (e) { /* ignore */ }
                }, 500);
            }
        });
    </script>
</body>
</html>
