<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Иваново · Бомж-симулятор · Круглые зоны на карте</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Блок авторизации -->
    <div id="authContainer" class="auth-container">
        <h2>🏙️ Иваново</h2>
        <div id="loginForm">
            <input type="email" id="loginEmail" placeholder="Email" autocomplete="email">
            <input type="password" id="loginPassword" placeholder="Пароль" autocomplete="current-password">
            <button id="loginBtn" class="action-btn" style="width:100%">Войти</button>
            <div class="switch-link" id="showRegisterLink">Нет аккаунта? Зарегистрироваться</div>
            <div id="authError" class="error-msg"></div>
        </div>
        <div id="registerForm" style="display: none;">
            <input type="text" id="regNick" placeholder="Ваш игровой ник" autocomplete="off">
            <input type="email" id="regEmail" placeholder="Email" autocomplete="email">
            <input type="password" id="regPassword" placeholder="Пароль" autocomplete="new-password">
            <button id="registerBtn" class="action-btn" style="width:100%">Зарегистрироваться</button>
            <div class="switch-link" id="showLoginLink">Уже есть аккаунт? Войти</div>
            <div id="regError" class="error-msg"></div>
        </div>
    </div>

    <!-- Игровой контейнер -->
    <div id="gameContainer" class="game-container">
        <div class="profile-section">
            <div class="avatar" id="avatarEmoji">🧔</div>
            <div id="playerNick" style="font-weight: bold; font-size: 1.2rem; margin-bottom: 8px;">Игрок</div>
        </div>

        <div class="stats-panel">
            <div class="stat">
                <div class="stat-header"><span>❤️ Здоровье</span><span id="healthValue">100 / 100</span></div>
                <div class="stat-bar"><div class="stat-fill health-fill" id="healthFill" style="width: 100%"></div></div>
            </div>
            <div class="stat">
                <div class="stat-header"><span>🍗 Голод</span><span id="hungerValue">100 / 100</span></div>
                <div class="stat-bar"><div class="stat-fill hunger-fill" id="hungerFill" style="width: 100%"></div></div>
            </div>
            <div class="stat">
                <div class="stat-header"><span>🔥 Тепло</span><span id="coldValue">100 / 100</span></div>
                <div class="stat-bar"><div class="stat-fill cold-fill" id="coldFill" style="width: 100%"></div></div>
            </div>
            <div class="money">💰 Деньги: <span id="moneyValue">500</span> ₽</div>
        </div>

        <div class="action-buttons">
            <button class="action-btn" id="inventoryBtn">🎒 Инвентарь</button>
            <button class="action-btn" id="mapBtn">🗺️ Карта города</button>
            <button class="action-btn" id="logoutMenuBtn">🚪 Выйти</button>
        </div>
        <div class="settings-item" style="margin-top: 16px;">
            <button id="themeToggle" class="reset-btn" style="background: var(--buy-btn-bg); color: white;">🌓 Тема</button>
        </div>
        <footer style="text-align: center; margin-top: 20px; font-size: 0.7rem;">Иваново · Версия 0.0.7 · Круглые зелёные зоны</footer>
    </div>

    <!-- Модальные окна -->
    <div id="inventoryModal" class="modal">
        <div class="modal-content">
            <div class="modal-header" style="display:flex; gap:16px; border-bottom:1px solid var(--card-border); padding-bottom:12px; margin-bottom:16px;">
                <button class="tab-btn active" data-tab="items">🎒 Вещи</button>
                <button class="tab-btn" data-tab="equipment">👕 Экипировка</button>
            </div>
            <div id="itemsTab" class="inventory-grid"></div>
            <div id="equipmentTab" class="equipment-slots" style="display: none;"></div>
            <button class="close-modal">Закрыть</button>
        </div>
    </div>

    <div id="mapModal" class="modal">
        <div class="modal-content" style="max-width: 800px;">
            <h3>🗺️ Карта города Иваново</h3>
            <div id="mapContainer" class="map-container"></div>
            <button class="close-modal">Закрыть</button>
        </div>
    </div>

    <div id="locationModal" class="modal">
        <div class="modal-content" id="locationModalContent"></div>
    </div>

    <div class="global-footer">
        <p>developed by Efich</p>
        <p>RPG · Иваново · Альфа 0.0.7</p>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js';
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from 'https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js';
        import { getFirestore, doc, setDoc, getDoc } from 'https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyCB2rBhMavOvxrd2Wox967_Xm23_oSMX8Y",
            authDomain: "ivanovo-a6770.firebaseapp.com",
            projectId: "ivanovo-a6770",
            storageBucket: "ivanovo-a6770.firebasestorage.app",
            messagingSenderId: "5386313391",
            appId: "1:5386313391:web:8ee5528233044dd1603e5a",
            measurementId: "G-9VSWLN6S5Y"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // DOM элементы
        const authContainer = document.getElementById('authContainer');
        const gameContainer = document.getElementById('gameContainer');
        const loginFormDiv = document.getElementById('loginForm');
        const registerFormDiv = document.getElementById('registerForm');
        const showRegisterLink = document.getElementById('showRegisterLink');
        const showLoginLink = document.getElementById('showLoginLink');
        const authError = document.getElementById('authError');
        const regError = document.getElementById('regError');
        const playerNickSpan = document.getElementById('playerNick');
        const healthValueSpan = document.getElementById('healthValue');
        const hungerValueSpan = document.getElementById('hungerValue');
        const coldValueSpan = document.getElementById('coldValue');
        const moneyValueSpan = document.getElementById('moneyValue');
        const healthFill = document.getElementById('healthFill');
        const hungerFill = document.getElementById('hungerFill');
        const coldFill = document.getElementById('coldFill');
        const themeToggle = document.getElementById('themeToggle');
        const logoutMenuBtn = document.getElementById('logoutMenuBtn');
        const inventoryBtn = document.getElementById('inventoryBtn');
        const mapBtn = document.getElementById('mapBtn');

        // Игровые переменные
        let health = 100, maxHealth = 100;
        let hunger = 100, maxHunger = 100;
        let cold = 100, maxCold = 100;
        let money = 500;
        let currentUserId = null;
        let inventory = [];
        let equipped = { head: null, body: null, legs: null, feet: null };

        // База предметов
        const itemsDB = {
            bread: { id: "bread", name: "Буханка хлеба", type: "food", icon: "🍞", effect: { hunger: 20, health: 0, cold: 0 }, price: 25, slot: null },
            vodka: { id: "vodka", name: "Водка", type: "alcohol", icon: "🍾", effect: { hunger: -10, health: 15, cold: 0 }, price: 40, slot: null },
            cigarettes: { id: "cigarettes", name: "Сигареты", type: "drug", icon: "🚬", effect: { hunger: 0, health: -5, cold: 10 }, price: 20, slot: null },
            medkit: { id: "medkit", name: "Аптечка", type: "medicine", icon: "💊", effect: { hunger: 0, health: 30, cold: 0 }, price: 50, slot: null },
            water: { id: "water", name: "Бутылка воды", type: "drink", icon: "💧", effect: { hunger: 10, health: 0, cold: 0 }, price: 15, slot: null },
            ushanka: { id: "ushanka", name: "Шапка-ушанка", type: "clothes", icon: "🧢", effect: { cold: 15 }, price: 80, slot: "head" },
            puhovik: { id: "puhovik", name: "Пуховик", type: "clothes", icon: "🧥", effect: { cold: 25 }, price: 200, slot: "body" },
            termo: { id: "termo", name: "Термобельё", type: "clothes", icon: "👖", effect: { cold: 10 }, price: 120, slot: "legs" },
            bercy: { id: "bercy", name: "Берцы", type: "clothes", icon: "👢", effect: { cold: 10 }, price: 150, slot: "feet" },
            empty_bottle: { id: "empty_bottle", name: "Пустая бутылка", type: "junk", icon: "🍾", effect: {}, price: 5, slot: null },
            old_hat: { id: "old_hat", name: "Старая шапка", type: "clothes", icon: "🧢", effect: { cold: 5 }, price: 20, slot: "head" }
        };

        // База локаций и действий
        const locationsDB = {
            railway: {
                id: "railway", name: "Вокзал", description: "Шум, люди, поезда. Можно попросить подаяние или поискать забытые вещи.",
                actions: [
                    { id: "beg", name: "Попросить подаяние", desc: "Риск: 30% получить отказ", effect: { money: [10, 50] }, risk: 30, riskEffect: { money: -10, health: -5 } },
                    { id: "search", name: "Поискать забытые вещи", desc: "Риск: 20% найти мусор", effect: { items: ["bread", "water"] }, risk: 20, riskEffect: { health: -10, hunger: -5 } }
                ]
            },
            market: {
                id: "market", name: "Рынок", description: "Оживлённое место, можно обменять вещи или украсть еду.",
                actions: [
                    { id: "trade", name: "Обменять пустые бутылки", desc: "Требуется пустая бутылка", needsItem: "empty_bottle", effect: { money: [5, 15] }, risk: 0 },
                    { id: "steal", name: "Украсть еду", desc: "Риск: 50% поймают", effect: { items: ["bread"] }, risk: 50, riskEffect: { money: -30, health: -15 } }
                ]
            },
            shelter: {
                id: "shelter", name: "Ночлежка", description: "Тёплое место для ночлега. Восстанавливает здоровье, но просит пожертвование.",
                actions: [
                    { id: "sleep", name: "Переночевать", desc: "Восстановить здоровье за 20₽", effect: { health: 30 }, cost: 20, risk: 0 },
                    { id: "eat", name: "Поесть в столовой", desc: "Восстановить голод за 25₽", effect: { hunger: 30 }, cost: 25, risk: 0 }
                ]
            },
            dump: {
                id: "dump", name: "Свалка", description: "Опасно, но можно найти ценные вещи.",
                actions: [
                    { id: "scavenge", name: "Покопаться в мусоре", desc: "Риск: 40% получить инфекцию", effect: { items: ["empty_bottle", "old_hat"] }, risk: 40, riskEffect: { health: -15, hunger: -5 } }
                ]
            },
            church: {
                id: "church", name: "Церковь", description: "Место покоя. Можно получить еду и исцеление.",
                actions: [
                    { id: "pray", name: "Помолиться", desc: "Восстановить здоровье", effect: { health: 20 }, cost: 0, risk: 0 },
                    { id: "get_food", name: "Попросить еду", desc: "Дадут хлеб", effect: { items: ["bread"] }, risk: 0 }
                ]
            },
            bar: {
                id: "bar", name: "Бар", description: "Можно выпить, подраться или найти работу.",
                actions: [
                    { id: "drink", name: "Выпить водку", desc: "Здоровье +10, голод -5, деньги -40", effect: { health: 10, hunger: -5, money: -40 }, risk: 0 },
                    { id: "fight", name: "Подраться", desc: "Риск: 50% получить травму", effect: { money: [20, 100] }, risk: 50, riskEffect: { health: -20 } }
                ]
            }
        };

        // ========== Вспомогательные функции ==========
        function updateUI() {
            healthValueSpan.innerText = `${Math.floor(health)} / ${maxHealth}`;
            hungerValueSpan.innerText = `${Math.floor(hunger)} / ${maxHunger}`;
            coldValueSpan.innerText = `${Math.floor(cold)} / ${maxCold}`;
            moneyValueSpan.innerText = Math.floor(money);
            healthFill.style.width = (health / maxHealth) * 100 + '%';
            hungerFill.style.width = (hunger / maxHunger) * 100 + '%';
            coldFill.style.width = (cold / maxCold) * 100 + '%';
        }

        function showMessage(text, bgColor = '#4caf50') {
            const msg = document.createElement('div');
            msg.innerText = text;
            msg.style.position = 'fixed';
            msg.style.bottom = '70px';
            msg.style.left = '50%';
            msg.style.transform = 'translateX(-50%)';
            msg.style.backgroundColor = bgColor;
            msg.style.color = 'white';
            msg.style.padding = '6px 18px';
            msg.style.borderRadius = '60px';
            msg.style.fontWeight = 'bold';
            msg.style.zIndex = '9999';
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 2000);
        }

        function recalcColdFromEquipment() {
            let bonus = 0;
            if (equipped.head && itemsDB[equipped.head]) bonus += itemsDB[equipped.head].effect.cold || 0;
            if (equipped.body && itemsDB[equipped.body]) bonus += itemsDB[equipped.body].effect.cold || 0;
            if (equipped.legs && itemsDB[equipped.legs]) bonus += itemsDB[equipped.legs].effect.cold || 0;
            if (equipped.feet && itemsDB[equipped.feet]) bonus += itemsDB[equipped.feet].effect.cold || 0;
            let newCold = Math.min(maxCold, 100 + bonus);
            cold = newCold;
            updateUI();
        }

        async function saveGameData() {
            if (!currentUserId) return;
            const docRef = doc(db, 'users', currentUserId);
            await setDoc(docRef, {
                health, hunger, cold, money, inventory, equipped,
                lastUpdated: new Date().toISOString()
            }, { merge: true });
            console.log("Данные сохранены");
        }

        async function loadGameData(userId) {
            if (!userId) return;
            currentUserId = userId;
            const docRef = doc(db, 'users', userId);
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                const data = docSnap.data();
                health = data.health ?? 100;
                hunger = data.hunger ?? 100;
                cold = data.cold ?? 100;
                money = data.money ?? 200;
                inventory = data.inventory ?? [];
                equipped = data.equipped ?? { head: null, body: null, legs: null, feet: null };
                updateUI();
                recalcColdFromEquipment();
            } else {
                health = 100; hunger = 100; cold = 100; money = 200;
                inventory = [
                    { id: "bread", count: 2 }, { id: "vodka", count: 1 }, { id: "cigarettes", count: 1 },
                    { id: "medkit", count: 1 }, { id: "ushanka", count: 1 }, { id: "puhovik", count: 1 }
                ];
                equipped = { head: null, body: null, legs: null, feet: null };
                updateUI();
                await saveGameData();
            }
        }

        // === Инвентарь и экипировка ===
        async function useItem(itemId) {
            const itemIndex = inventory.findIndex(i => i.id === itemId);
            if (itemIndex === -1 || inventory[itemIndex].count <= 0) { showMessage("Нет предмета!", "#e74c3c"); return; }
            const itemData = itemsDB[itemId];
            if (!itemData) return;
            let effText = "";
            if (itemData.effect.hunger) { hunger = Math.min(maxHunger, Math.max(0, hunger + itemData.effect.hunger)); effText += `Голод ${itemData.effect.hunger>0?'+':''}${itemData.effect.hunger}. `; }
            if (itemData.effect.health) { health = Math.min(maxHealth, Math.max(0, health + itemData.effect.health)); effText += `Здоровье ${itemData.effect.health>0?'+':''}${itemData.effect.health}. `; }
            if (itemData.effect.cold) { cold = Math.min(maxCold, Math.max(0, cold + itemData.effect.cold)); effText += `Тепло ${itemData.effect.cold>0?'+':''}${itemData.effect.cold}. `; }
            if (inventory[itemIndex].count === 1) inventory.splice(itemIndex,1);
            else inventory[itemIndex].count--;
            updateUI();
            await saveGameData();
            renderItemsTab(); renderEquipmentTab();
            showMessage(`🍺 Использовали ${itemData.name}. ${effText}`, "#4caf50");
        }

        async function equipItem(itemId) {
            const itemIndex = inventory.findIndex(i => i.id === itemId);
            if (itemIndex === -1 || inventory[itemIndex].count <= 0) { showMessage("Нет предмета!", "#e74c3c"); return; }
            const itemData = itemsDB[itemId];
            if (!itemData || !itemData.slot) { showMessage("Нельзя надеть!", "#e74c3c"); return; }
            const slot = itemData.slot;
            if (equipped[slot]) {
                const oldId = equipped[slot];
                const exist = inventory.findIndex(i => i.id === oldId);
                if (exist !== -1) inventory[exist].count++;
                else inventory.push({ id: oldId, count: 1 });
            }
            equipped[slot] = itemId;
            if (inventory[itemIndex].count === 1) inventory.splice(itemIndex,1);
            else inventory[itemIndex].count--;
            await saveGameData();
            recalcColdFromEquipment();
            renderItemsTab(); renderEquipmentTab();
            showMessage(`👕 Надели ${itemData.name}`, "#4caf50");
        }

        async function unequipItem(slot) {
            const itemId = equipped[slot];
            if (!itemId) return;
            const itemData = itemsDB[itemId];
            const exist = inventory.findIndex(i => i.id === itemId);
            if (exist !== -1) inventory[exist].count++;
            else inventory.push({ id: itemId, count: 1 });
            equipped[slot] = null;
            await saveGameData();
            recalcColdFromEquipment();
            renderItemsTab(); renderEquipmentTab();
            showMessage(`🧥 Сняли ${itemData.name}`, "#6c757d");
        }

        function renderItemsTab() {
            const itemsTab = document.getElementById('itemsTab');
            if (!itemsTab) return;
            const usable = inventory.filter(i => { const d = itemsDB[i.id]; return d && (d.type === 'food' || d.type === 'alcohol' || d.type === 'drug' || d.type === 'medicine' || d.type === 'drink'); });
            const equipable = inventory.filter(i => { const d = itemsDB[i.id]; return d && d.type === 'clothes'; });
            if (usable.length === 0 && equipable.length === 0) { itemsTab.innerHTML = '<p style="text-align:center;">🧺 Инвентарь пуст</p>'; return; }
            let html = '';
            if (usable.length) { html += '<div><strong>📦 Расходуемые</strong></div>'; usable.forEach(i => { const d = itemsDB[i.id]; html += `<div class="inventory-item"><div class="item-info"><span class="item-icon">${d.icon}</span><span class="item-name">${d.name}</span><span class="item-count">×${i.count}</span></div><button class="use-btn" data-id="${i.id}">Использовать</button></div>`; }); }
            if (equipable.length) { html += '<div style="margin-top:12px;"><strong>👔 Одежда</strong></div>'; equipable.forEach(i => { const d = itemsDB[i.id]; html += `<div class="inventory-item"><div class="item-info"><span class="item-icon">${d.icon}</span><span class="item-name">${d.name}</span><span class="item-count">×${i.count}</span></div><button class="equip-btn" data-id="${i.id}">Надеть</button></div>`; }); }
            itemsTab.innerHTML = html;
            document.querySelectorAll('.use-btn').forEach(btn => { btn.addEventListener('click', () => useItem(btn.dataset.id)); });
            document.querySelectorAll('.equip-btn').forEach(btn => { btn.addEventListener('click', () => equipItem(btn.dataset.id)); });
        }

        function renderEquipmentTab() {
            const eqTab = document.getElementById('equipmentTab');
            if (!eqTab) return;
            const slots = [
                { key: 'head', name: 'Головной убор', icon: '🧢' },
                { key: 'body', name: 'Верх', icon: '🧥' },
                { key: 'legs', name: 'Штаны', icon: '👖' },
                { key: 'feet', name: 'Обувь', icon: '👢' }
            ];
            let html = '';
            for (let s of slots) {
                const itemId = equipped[s.key];
                const data = itemId ? itemsDB[itemId] : null;
                html += `<div class="slot"><div class="slot-info"><span class="slot-icon">${s.icon}</span><span class="slot-name">${s.name}</span>${data ? `<span class="item-name">${data.name}</span>` : `<span class="slot-empty">— пусто —</span>`}</div>${data ? `<button class="unequip-btn" data-slot="${s.key}">Снять</button>` : ''}</div>`;
            }
            eqTab.innerHTML = html;
            document.querySelectorAll('.unequip-btn').forEach(btn => { btn.addEventListener('click', () => unequipItem(btn.dataset.slot)); });
        }

        function initModalTabs() {
            const tabs = document.querySelectorAll('#inventoryModal .tab-btn');
            const itemsTab = document.getElementById('itemsTab');
            const equipTab = document.getElementById('equipmentTab');
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    if (tab.dataset.tab === 'items') {
                        itemsTab.style.display = 'flex';
                        equipTab.style.display = 'none';
                        renderItemsTab();
                    } else {
                        itemsTab.style.display = 'none';
                        equipTab.style.display = 'flex';
                        renderEquipmentTab();
                    }
                });
            });
        }

        // === Действия в локациях ===
        async function executeAction(locationId, action) {
            let success = true;
            let msg = "";
            if (action.needsItem) {
                const has = inventory.find(i => i.id === action.needsItem && i.count > 0);
                if (!has) { showMessage(`Нет ${itemsDB[action.needsItem]?.name || action.needsItem}`, "#e74c3c"); return; }
            }
            if (action.cost && action.cost > 0) {
                if (money < action.cost) { showMessage(`Не хватает ${action.cost}₽`, "#e74c3c"); return; }
                money -= action.cost;
            }
            if (action.risk && action.risk > 0) {
                if (Math.random() * 100 < action.risk) {
                    success = false;
                    msg = "❌ Неудача! ";
                    if (action.riskEffect) {
                        if (action.riskEffect.money) money += action.riskEffect.money;
                        if (action.riskEffect.health) health = Math.min(maxHealth, Math.max(0, health + action.riskEffect.health));
                        if (action.riskEffect.hunger) hunger = Math.min(maxHunger, Math.max(0, hunger + action.riskEffect.hunger));
                        msg += `${action.riskEffect.health ? `Здоровье ${action.riskEffect.health>0?'+':''}${action.riskEffect.health}. ` : ''}${action.riskEffect.money ? `Деньги ${action.riskEffect.money>0?'+':''}${action.riskEffect.money}. ` : ''}`;
                    }
                }
            }
            if (success) {
                msg = "✅ Успех! ";
                if (action.effect) {
                    if (action.effect.money) {
                        let add = Array.isArray(action.effect.money) ? Math.floor(Math.random()*(action.effect.money[1]-action.effect.money[0]+1)+action.effect.money[0]) : action.effect.money;
                        money += add;
                        msg += `+${add}₽. `;
                    }
                    if (action.effect.health) {
                        let add = Array.isArray(action.effect.health) ? Math.floor(Math.random()*(action.effect.health[1]-action.effect.health[0]+1)+action.effect.health[0]) : action.effect.health;
                        health = Math.min(maxHealth, Math.max(0, health+add));
                        msg += `Здоровье ${add>0?'+':''}${add}. `;
                    }
                    if (action.effect.hunger) {
                        let add = Array.isArray(action.effect.hunger) ? Math.floor(Math.random()*(action.effect.hunger[1]-action.effect.hunger[0]+1)+action.effect.hunger[0]) : action.effect.hunger;
                        hunger = Math.min(maxHunger, Math.max(0, hunger+add));
                        msg += `Голод ${add>0?'+':''}${add}. `;
                    }
                    if (action.effect.items) {
                        let items = Array.isArray(action.effect.items) ? action.effect.items : [action.effect.items];
                        items.forEach(it => {
                            const idx = inventory.findIndex(i => i.id === it);
                            if (idx !== -1) inventory[idx].count++;
                            else inventory.push({ id: it, count: 1 });
                            msg += `+1 ${itemsDB[it]?.name}. `;
                        });
                    }
                }
                if (action.needsItem) {
                    const idx = inventory.findIndex(i => i.id === action.needsItem);
                    if (idx !== -1) {
                        if (inventory[idx].count === 1) inventory.splice(idx,1);
                        else inventory[idx].count--;
                        msg += `Израсходован ${itemsDB[action.needsItem]?.name}. `;
                    }
                }
            }
            updateUI();
            await saveGameData();
            showMessage(msg, success ? "#4caf50" : "#e74c3c");
            document.getElementById('locationModal').style.display = 'none';
            if (document.getElementById('inventoryModal').style.display === 'flex') {
                renderItemsTab(); renderEquipmentTab();
            }
        }

        function openLocationModal(locationId) {
            const loc = locationsDB[locationId];
            if (!loc) return;
            const modalContent = document.getElementById('locationModalContent');
            modalContent.innerHTML = `
                <h3>${loc.name}</h3>
                <p>${loc.description}</p>
                <div class="inventory-grid">
                    ${loc.actions.map(a => `
                        <div class="inventory-item" style="margin-bottom:8px;">
                            <div class="item-info"><div><strong>${a.name}</strong><br><small>${a.desc}</small></div></div>
                            <button class="action-location-btn" data-location="${locationId}" data-action-id="${a.id}">Выбрать</button>
                        </div>
                    `).join('')}
                </div>
                <button class="close-modal">Закрыть</button>
            `;
            document.getElementById('locationModal').style.display = 'flex';
            document.querySelectorAll('.action-location-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const locId = btn.dataset.location;
                    const actId = btn.dataset.actionId;
                    const act = locationsDB[locId].actions.find(a => a.id === actId);
                    if (act) executeAction(locId, act);
                });
            });
            document.querySelector('#locationModal .close-modal').addEventListener('click', () => {
                document.getElementById('locationModal').style.display = 'none';
            });
        }

        // === Интерактивная карта с круглыми зонами ===
        function renderInteractiveMap() {
            const container = document.getElementById('mapContainer');
            if (!container) return;
            // Круглые зоны (центр, радиус). Координаты под картинку 800x600.
            const zones = [
                { id: "railway", name: "Вокзал", cx: 125, cy: 100, r: 45 },
                { id: "market", name: "Рынок", cx: 375, cy: 100, r: 50 },
                { id: "shelter", name: "Ночлежка", cx: 625, cy: 115, r: 48 },
                { id: "dump", name: "Свалка", cx: 155, cy: 360, r: 50 },
                { id: "church", name: "Церковь", cx: 395, cy: 360, r: 48 },
                { id: "bar", name: "Бар", cx: 655, cy: 375, r: 45 }
            ];
            container.innerHTML = `
                <div style="position: relative; display: inline-block; width: 100%;">
                    <img src="map.png" alt="Карта Иваново" class="map-image" style="width:100%; height:auto;">
                    <svg class="map-overlay" viewBox="0 0 800 600" preserveAspectRatio="none" style="position: absolute; top:0; left:0; width:100%; height:100%;">
                        ${zones.map(z => `<circle cx="${z.cx}" cy="${z.cy}" r="${z.r}" data-location="${z.id}" data-name="${z.name}" fill="rgba(0,200,0,0.25)" stroke="rgba(0,200,0,0.6)" stroke-width="2" />`).join('')}
                    </svg>
                </div>
            `;
            // Всплывающая подсказка
            const tooltip = document.createElement('div');
            tooltip.className = 'location-tooltip';
            document.body.appendChild(tooltip);
            const circles = document.querySelectorAll('.map-overlay circle');
            circles.forEach(circle => {
                const name = circle.getAttribute('data-name');
                circle.addEventListener('mouseenter', (e) => {
                    tooltip.textContent = name;
                    tooltip.style.display = 'block';
                });
                circle.addEventListener('mousemove', (e) => {
                    tooltip.style.left = e.clientX + 15 + 'px';
                    tooltip.style.top = e.clientY - 30 + 'px';
                });
                circle.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
                circle.addEventListener('click', () => {
                    const locId = circle.getAttribute('data-location');
                    if (locId && locationsDB[locId]) openLocationModal(locId);
                    else showMessage("Локация не добавлена", "#f0ad4e");
                });
            });
        }

        // === Авторизация ===
        async function saveUserNickOnRegister(userId, email, nick) {
            await setDoc(doc(db, 'users', userId), {
                displayName: nick, userEmail: email, health:100, hunger:100, cold:100, money:200,
                inventory: [{ id: "bread", count:2 },{ id: "vodka", count:1 },{ id: "cigarettes", count:1 },{ id: "medkit", count:1 },{ id: "ushanka", count:1 },{ id: "puhovik", count:1 }],
                equipped: { head:null, body:null, legs:null, feet:null }
            }, { merge: true });
            if (auth.currentUser) await updateProfile(auth.currentUser, { displayName: nick });
        }

        showRegisterLink.addEventListener('click', (e) => { e.preventDefault(); loginFormDiv.style.display='none'; registerFormDiv.style.display='block'; authError.innerText=''; regError.innerText=''; });
        showLoginLink.addEventListener('click', (e) => { e.preventDefault(); registerFormDiv.style.display='none'; loginFormDiv.style.display='block'; authError.innerText=''; regError.innerText=''; });
        document.getElementById('loginBtn').addEventListener('click', async () => { const email=document.getElementById('loginEmail').value, pass=document.getElementById('loginPassword').value; authError.innerText=''; try{ await signInWithEmailAndPassword(auth, email, pass); } catch(e){ authError.innerText=e.message; } });
        document.getElementById('registerBtn').addEventListener('click', async () => { const nick=document.getElementById('regNick').value.trim(), email=document.getElementById('regEmail').value, pass=document.getElementById('regPassword').value; regError.innerText=''; if(!nick){ regError.innerText='Введите ник'; return; } try{ const uc=await createUserWithEmailAndPassword(auth, email, pass); await saveUserNickOnRegister(uc.user.uid, email, nick); await updateProfile(auth.currentUser, { displayName: nick }); showMessage('Регистрация успешна!', '#4caf50'); } catch(e){ regError.innerText=e.message; } });
        logoutMenuBtn.addEventListener('click', async () => { await signOut(auth); });
        inventoryBtn.addEventListener('click', () => { renderItemsTab(); renderEquipmentTab(); document.getElementById('inventoryModal').style.display='flex'; });
        mapBtn.addEventListener('click', () => { renderInteractiveMap(); document.getElementById('mapModal').style.display='flex'; });
        document.querySelectorAll('.close-modal').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const modal = e.target.closest('.modal');
                if (modal) modal.style.display = 'none';
            });
        });
        function initTheme() { const saved = localStorage.getItem('rpgTheme'); if (saved === 'light') document.body.classList.add('light-theme'); else document.body.classList.remove('light-theme'); }
        function toggleTheme() { document.body.classList.toggle('light-theme'); localStorage.setItem('rpgTheme', document.body.classList.contains('light-theme') ? 'light' : 'dark'); }
        themeToggle.addEventListener('click', toggleTheme);
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                authContainer.style.display='none'; gameContainer.style.display='block';
                playerNickSpan.innerText = user.displayName || 'Игрок';
                await loadGameData(user.uid);
                initModalTabs();
            } else {
                gameContainer.style.display='none'; authContainer.style.display='block';
                loginFormDiv.style.display='block'; registerFormDiv.style.display='none';
                authError.innerText=''; regError.innerText='';
                document.getElementById('loginEmail').value=''; document.getElementById('loginPassword').value='';
                document.getElementById('regNick').value=''; document.getElementById('regEmail').value=''; document.getElementById('regPassword').value='';
                currentUserId = null;
            }
        });
        initTheme();
        updateUI();
    </script>
</body>
</html>
