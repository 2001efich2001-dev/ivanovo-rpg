<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Иваново · Бомж-симулятор · Инвентарь и экипировка</title>
    <style>
        * {
            box-sizing: border-box;
            transition: background-color 0.2s ease, border-color 0.2s, box-shadow 0.2s, color 0.2s;
        }
        :root {
            --bg-gradient-start: #1a2634;
            --bg-gradient-end: #0e1419;
            --container-bg: rgba(22, 30, 38, 0.85);
            --panel-bg: #0b1014;
            --text-primary: #ffffff;
            --text-secondary: #c0d0e0;
            --accent-gold: #FFB347;
            --accent-glow: #ffd966;
            --card-bg: #1e2a32;
            --card-border: #3a4a56;
            --stat-bg: #0f181f;
            --button-click-bg: radial-gradient(circle at 30% 20%, #ffd966, #e67e22);
            --button-shadow: #b45f1b;
            --buy-btn-bg: #3a6b47;
            --buy-btn-shadow: #1e3a2f;
            --reset-bg: #3c2e2b;
            --reset-text: #ffb4a2;
            --health-color: #e74c3c;
            --hunger-color: #f39c12;
            --cold-color: #3498db;
        }
        body.light-theme {
            --bg-gradient-start: #f0f2f5;
            --bg-gradient-end: #d6dce2;
            --container-bg: rgba(245, 248, 250, 0.95);
            --panel-bg: #ffffff;
            --text-primary: #1e2a32;
            --text-secondary: #4a6272;
            --accent-gold: #e67e22;
            --accent-glow: #f39c12;
            --card-bg: #ffffff;
            --card-border: #cfdde6;
            --stat-bg: #eef2f5;
            --button-click-bg: radial-gradient(circle at 30% 20%, #ffe0a3, #f0b27a);
            --button-shadow: #b45f1b;
            --buy-btn-bg: #2c6e49;
            --buy-btn-shadow: #1e462f;
            --reset-bg: #e0cfc9;
            --reset-text: #b85c3a;
        }
        body {
            background: linear-gradient(145deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            margin: 0;
            padding: 20px;
            color: var(--text-primary);
            flex-direction: column;
        }
        .game-container {
            background: var(--container-bg);
            backdrop-filter: blur(4px);
            border-radius: 64px;
            padding: 24px 24px 32px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
            width: 100%;
            max-width: 550px;
            position: relative;
            display: none;
        }
        .auth-container {
            background: var(--container-bg);
            backdrop-filter: blur(4px);
            border-radius: 64px;
            padding: 30px 25px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
        }
        .auth-container h2 {
            margin-top: 0;
            color: var(--accent-gold);
        }
        .auth-container input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 40px;
            border: 1px solid var(--card-border);
            background: var(--stat-bg);
            color: var(--text-primary);
            font-size: 1rem;
        }
        .auth-container button {
            width: 100%;
            margin-top: 12px;
        }
        .switch-link {
            color: var(--accent-gold);
            cursor: pointer;
            text-decoration: underline;
            margin-top: 15px;
            display: inline-block;
        }
        .error-msg {
            color: #ff8888;
            margin-top: 10px;
            font-size: 0.85rem;
        }
        .profile-section {
            text-align: center;
            margin-bottom: 24px;
        }
        .avatar {
            font-size: 6rem;
            background: var(--stat-bg);
            width: 120px;
            height: 120px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            border: 3px solid var(--accent-gold);
        }
        .stats-panel {
            background: var(--panel-bg);
            border-radius: 48px;
            padding: 16px 20px;
            margin-bottom: 20px;
        }
        .stat {
            margin-bottom: 12px;
        }
        .stat-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 0.85rem;
        }
        .stat-bar {
            height: 12px;
            background: var(--stat-bg);
            border-radius: 12px;
            overflow: hidden;
        }
        .stat-fill {
            height: 100%;
            border-radius: 12px;
            width: 100%;
            transition: width 0.3s ease;
        }
        .health-fill { background: var(--health-color); }
        .hunger-fill { background: var(--hunger-color); }
        .cold-fill { background: var(--cold-color); }
        .money {
            background: var(--accent-gold);
            color: #1e2a32;
            padding: 10px;
            border-radius: 40px;
            text-align: center;
            font-weight: bold;
            margin-top: 16px;
        }
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .action-btn {
            flex: 1;
            background: var(--buy-btn-bg);
            border: none;
            padding: 12px 0;
            border-radius: 40px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            font-size: 1rem;
            box-shadow: 0 2px 0 var(--buy-btn-shadow);
            transition: 0.05s linear;
        }
        .action-btn:active {
            transform: translateY(2px);
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: var(--card-bg);
            border-radius: 48px;
            padding: 24px;
            width: 90%;
            max-width: 550px;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid var(--card-border);
        }
        .modal-header {
            display: flex;
            gap: 16px;
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 12px;
            margin-bottom: 16px;
        }
        .tab-btn {
            background: none;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 1rem;
        }
        .tab-btn.active {
            background: var(--accent-gold);
            color: #1e2a32;
        }
        .inventory-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .inventory-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--stat-bg);
            padding: 10px 16px;
            border-radius: 40px;
            gap: 10px;
            flex-wrap: wrap;
        }
        .item-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 2;
        }
        .item-icon {
            font-size: 1.6rem;
        }
        .item-name {
            font-weight: bold;
        }
        .item-count {
            background: var(--card-bg);
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.8rem;
        }
        .use-btn, .equip-btn, .unequip-btn {
            background: var(--buy-btn-bg);
            border: none;
            padding: 6px 16px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        .unequip-btn {
            background: #7f8c8d;
        }
        .equipment-slots {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .slot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--stat-bg);
            padding: 12px 16px;
            border-radius: 40px;
        }
        .slot-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .slot-icon {
            font-size: 1.5rem;
        }
        .slot-name {
            font-weight: bold;
        }
        .slot-empty {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        .close-modal {
            background: var(--reset-bg);
            margin-top: 20px;
            padding: 8px 24px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            color: var(--text-primary);
            width: 100%;
        }
        .settings-item {
            margin: 20px 0;
            text-align: center;
        }
        .reset-btn {
            background: var(--reset-bg);
            color: var(--reset-text);
            border: none;
            padding: 10px 25px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
        }
        .global-footer {
            text-align: center;
            margin-top: 30px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.7;
        }
        .global-footer p {
            margin: 4px 0;
        }
        @media (max-width: 480px) {
            .avatar { font-size: 4rem; width: 90px; height: 90px; }
            .action-btn { font-size: 0.8rem; padding: 10px 0; }
            .inventory-item { flex-direction: column; text-align: center; }
            .item-info { justify-content: center; }
            .slot { flex-direction: column; text-align: center; gap: 10px; }
        }
    </style>
</head>
<body>

    <!-- Блок авторизации -->
    <div id="authContainer" class="auth-container">
        <h2>🏙️ Иваново</h2>
        <div id="loginForm">
            <input type="email" id="loginEmail" placeholder="Email" autocomplete="email">
            <input type="password" id="loginPassword" placeholder="Пароль" autocomplete="current-password">
            <button id="loginBtn" class="action-btn" style="width:100%">Войти</button>
            <div class="switch-link" id="showRegisterLink">Нет аккаунта? Зарегистрироваться</div>
            <div id="authError" class="error-msg"></div>
        </div>
        <div id="registerForm" style="display: none;">
            <input type="text" id="regNick" placeholder="Ваш игровой ник" autocomplete="off">
            <input type="email" id="regEmail" placeholder="Email" autocomplete="email">
            <input type="password" id="regPassword" placeholder="Пароль" autocomplete="new-password">
            <button id="registerBtn" class="action-btn" style="width:100%">Зарегистрироваться</button>
            <div class="switch-link" id="showLoginLink">Уже есть аккаунт? Войти</div>
            <div id="regError" class="error-msg"></div>
        </div>
    </div>

    <!-- Игровой контейнер -->
    <div id="gameContainer" class="game-container">
        <div class="profile-section">
            <div class="avatar" id="avatarEmoji">🧔</div>
            <div id="playerNick" style="font-weight: bold; font-size: 1.2rem; margin-bottom: 8px;">Игрок</div>
        </div>

        <div class="stats-panel">
            <div class="stat">
                <div class="stat-header">
                    <span>❤️ Здоровье</span>
                    <span id="healthValue">100 / 100</span>
                </div>
                <div class="stat-bar">
                    <div class="stat-fill health-fill" id="healthFill" style="width: 100%"></div>
                </div>
            </div>
            <div class="stat">
                <div class="stat-header">
                    <span>🍗 Голод</span>
                    <span id="hungerValue">100 / 100</span>
                </div>
                <div class="stat-bar">
                    <div class="stat-fill hunger-fill" id="hungerFill" style="width: 100%"></div>
                </div>
            </div>
            <div class="stat">
                <div class="stat-header">
                    <span>🔥 Тепло</span>
                    <span id="coldValue">100 / 100</span>
                </div>
                <div class="stat-bar">
                    <div class="stat-fill cold-fill" id="coldFill" style="width: 100%"></div>
                </div>
            </div>
            <div class="money">
                💰 Деньги: <span id="moneyValue">500</span> ₽
            </div>
        </div>

        <div class="action-buttons">
            <button class="action-btn" id="inventoryBtn">🎒 Инвентарь</button>
            <button class="action-btn" id="mapBtn">🗺️ Карта</button>
            <button class="action-btn" id="logoutMenuBtn">🚪 Выйти</button>
        </div>
        <div class="settings-item" style="margin-top: 16px;">
            <button id="themeToggle" class="reset-btn" style="background: var(--buy-btn-bg); color: white;">🌓 Тема</button>
        </div>
        <footer style="text-align: center; margin-top: 20px; font-size: 0.7rem; color: var(--text-secondary);">
            Иваново · Бомж-симулятор | Версия 0.0.4 | Экипировка
        </footer>
    </div>

    <!-- Модальное окно инвентаря с вкладками -->
    <div id="inventoryModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <button class="tab-btn active" data-tab="items">🎒 Вещи</button>
                <button class="tab-btn" data-tab="equipment">👕 Экипировка</button>
            </div>
            <div id="itemsTab" class="inventory-grid"></div>
            <div id="equipmentTab" class="equipment-slots" style="display: none;"></div>
            <button class="close-modal">Закрыть</button>
        </div>
    </div>

    <!-- Модальное окно карты (заглушка) -->
    <div id="mapModal" class="modal">
        <div class="modal-content">
            <h3>🗺️ Карта Иваново</h3>
            <p>Локации пока в разработке.</p>
            <button class="close-modal">Закрыть</button>
        </div>
    </div>

    <div class="global-footer">
        <p>developed by Efich</p>
        <p>RPG · Иваново · Альфа 0.0.4</p>
    </div>

    <script type="module">
        // ========== Инициализация Firebase ==========
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js';
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from 'https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js';
        import { getFirestore, doc, setDoc, getDoc } from 'https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyCB2rBhMavOvxrd2Wox967_Xm23_oSMX8Y",
            authDomain: "ivanovo-a6770.firebaseapp.com",
            projectId: "ivanovo-a6770",
            storageBucket: "ivanovo-a6770.firebasestorage.app",
            messagingSenderId: "5386313391",
            appId: "1:5386313391:web:8ee5528233044dd1603e5a",
            measurementId: "G-9VSWLN6S5Y"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // DOM элементы
        const authContainer = document.getElementById('authContainer');
        const gameContainer = document.getElementById('gameContainer');
        const loginFormDiv = document.getElementById('loginForm');
        const registerFormDiv = document.getElementById('registerForm');
        const showRegisterLink = document.getElementById('showRegisterLink');
        const showLoginLink = document.getElementById('showLoginLink');
        const authError = document.getElementById('authError');
        const regError = document.getElementById('regError');
        const playerNickSpan = document.getElementById('playerNick');
        const healthValueSpan = document.getElementById('healthValue');
        const hungerValueSpan = document.getElementById('hungerValue');
        const coldValueSpan = document.getElementById('coldValue');
        const moneyValueSpan = document.getElementById('moneyValue');
        const healthFill = document.getElementById('healthFill');
        const hungerFill = document.getElementById('hungerFill');
        const coldFill = document.getElementById('coldFill');
        const themeToggle = document.getElementById('themeToggle');
        const logoutMenuBtn = document.getElementById('logoutMenuBtn');
        const inventoryBtn = document.getElementById('inventoryBtn');

        // Текущие характеристики
        let health = 100, maxHealth = 100;
        let hunger = 100, maxHunger = 100;
        let cold = 100, maxCold = 100;
        let money = 500;
        let currentUserId = null;
        
        // Инвентарь: массив объектов { id, name, type, icon, count, slot, effect }
        let inventory = [];
        
        // Экипировка
        let equipped = {
            head: null,
            body: null,
            legs: null,
            feet: null
        };

        // База предметов
        const itemsDB = {
            // Еда и лекарства
            bread: { id: "bread", name: "Буханка хлеба", type: "food", icon: "🍞", effect: { hunger: 20, health: 0, cold: 0 }, price: 25, slot: null },
            vodka: { id: "vodka", name: "Водка", type: "alcohol", icon: "🍾", effect: { hunger: -10, health: 15, cold: 0 }, price: 40, slot: null },
            cigarettes: { id: "cigarettes", name: "Сигареты", type: "drug", icon: "🚬", effect: { hunger: 0, health: -5, cold: 10 }, price: 20, slot: null },
            medkit: { id: "medkit", name: "Аптечка", type: "medicine", icon: "💊", effect: { hunger: 0, health: 30, cold: 0 }, price: 50, slot: null },
            water: { id: "water", name: "Бутылка воды", type: "drink", icon: "💧", effect: { hunger: 10, health: 0, cold: 0 }, price: 15, slot: null },
            // Одежда
            ushanka: { id: "ushanka", name: "Шапка-ушанка", type: "clothes", icon: "🧢", effect: { cold: 15 }, price: 80, slot: "head" },
            puhovik: { id: "puhovik", name: "Пуховик", type: "clothes", icon: "🧥", effect: { cold: 25 }, price: 200, slot: "body" },
            termo: { id: "termo", name: "Термобельё", type: "clothes", icon: "👖", effect: { cold: 10 }, price: 120, slot: "legs" },
            bercy: { id: "bercy", name: "Берцы", type: "clothes", icon: "👢", effect: { cold: 10 }, price: 150, slot: "feet" }
        };

        function updateUI() {
            healthValueSpan.innerText = `${Math.floor(health)} / ${maxHealth}`;
            hungerValueSpan.innerText = `${Math.floor(hunger)} / ${maxHunger}`;
            coldValueSpan.innerText = `${Math.floor(cold)} / ${maxCold}`;
            moneyValueSpan.innerText = Math.floor(money);
            healthFill.style.width = (health / maxHealth) * 100 + '%';
            hungerFill.style.width = (hunger / maxHunger) * 100 + '%';
            coldFill.style.width = (cold / maxCold) * 100 + '%';
        }

        function showMessage(text, bgColor = '#4caf50') {
            const msg = document.createElement('div');
            msg.innerText = text;
            msg.style.position = 'fixed';
            msg.style.bottom = '70px';
            msg.style.left = '50%';
            msg.style.transform = 'translateX(-50%)';
            msg.style.backgroundColor = bgColor;
            msg.style.color = 'white';
            msg.style.padding = '6px 18px';
            msg.style.borderRadius = '60px';
            msg.style.fontWeight = 'bold';
            msg.style.zIndex = '9999';
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 2000);
        }

        // Пересчёт тепла от экипировки
        function recalcColdFromEquipment() {
            let bonus = 0;
            if (equipped.head && itemsDB[equipped.head]) bonus += itemsDB[equipped.head].effect.cold || 0;
            if (equipped.body && itemsDB[equipped.body]) bonus += itemsDB[equipped.body].effect.cold || 0;
            if (equipped.legs && itemsDB[equipped.legs]) bonus += itemsDB[equipped.legs].effect.cold || 0;
            if (equipped.feet && itemsDB[equipped.feet]) bonus += itemsDB[equipped.feet].effect.cold || 0;
            // Базовое тепло 100 + бонус от одежды, но не выше максимума
            let newCold = Math.min(maxCold, 100 + bonus);
            cold = newCold;
            updateUI();
        }

        // Сохранение всей игры
        async function saveGameData() {
            if (!currentUserId) return;
            const docRef = doc(db, 'users', currentUserId);
            await setDoc(docRef, {
                health: health,
                hunger: hunger,
                cold: cold,
                money: money,
                inventory: inventory,
                equipped: equipped,
                lastUpdated: new Date().toISOString()
            }, { merge: true });
            console.log("Данные сохранены в Firestore");
        }

        async function loadGameData(userId) {
            if (!userId) return;
            currentUserId = userId;
            const docRef = doc(db, 'users', userId);
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                const data = docSnap.data();
                health = data.health ?? 100;
                hunger = data.hunger ?? 100;
                cold = data.cold ?? 100;
                money = data.money ?? 200;
                inventory = data.inventory ?? [];
                equipped = data.equipped ?? { head: null, body: null, legs: null, feet: null };
                updateUI();
                recalcColdFromEquipment();
                console.log("Данные загружены из Firestore");
            } else {
                // Первый вход — стартовые данные
                health = 100;
                hunger = 100;
                cold = 100;
                money = 200;
                inventory = [
                    { id: "bread", count: 2 },
                    { id: "vodka", count: 1 },
                    { id: "cigarettes", count: 1 },
                    { id: "medkit", count: 1 },
                    { id: "ushanka", count: 1 },
                    { id: "puhovik", count: 1 }
                ];
                equipped = { head: null, body: null, legs: null, feet: null };
                updateUI();
                await saveGameData();
                console.log("Создан новый документ пользователя");
            }
        }

        // Использование предмета (еда, лекарства)
        async function useItem(itemId) {
            const itemIndex = inventory.findIndex(i => i.id === itemId);
            if (itemIndex === -1 || inventory[itemIndex].count <= 0) {
                showMessage("Предмета нет в инвентаре!", "#e74c3c");
                return;
            }
            
            const itemData = itemsDB[itemId];
            if (!itemData) return;
            
            // Применяем эффекты
            let effectText = "";
            if (itemData.effect.hunger) {
                let newHunger = hunger + itemData.effect.hunger;
                hunger = Math.min(maxHunger, Math.max(0, newHunger));
                effectText += `Голод ${itemData.effect.hunger > 0 ? '+' : ''}${itemData.effect.hunger}. `;
            }
            if (itemData.effect.health) {
                let newHealth = health + itemData.effect.health;
                health = Math.min(maxHealth, Math.max(0, newHealth));
                effectText += `Здоровье ${itemData.effect.health > 0 ? '+' : ''}${itemData.effect.health}. `;
            }
            if (itemData.effect.cold) {
                let newCold = cold + itemData.effect.cold;
                cold = Math.min(maxCold, Math.max(0, newCold));
                effectText += `Тепло ${itemData.effect.cold > 0 ? '+' : ''}${itemData.effect.cold}. `;
            }
            
            // Уменьшаем количество
            if (inventory[itemIndex].count === 1) {
                inventory.splice(itemIndex, 1);
            } else {
                inventory[itemIndex].count--;
            }
            
            updateUI();
            await saveGameData();
            renderItemsTab();
            showMessage(`🍺 Вы использовали ${itemData.name}. ${effectText}`, "#4caf50");
        }

        // Надеть предмет
        async function equipItem(itemId) {
            const itemIndex = inventory.findIndex(i => i.id === itemId);
            if (itemIndex === -1 || inventory[itemIndex].count <= 0) {
                showMessage("Предмета нет в инвентаре!", "#e74c3c");
                return;
            }
            
            const itemData = itemsDB[itemId];
            if (!itemData || !itemData.slot) {
                showMessage("Этот предмет нельзя надеть!", "#e74c3c");
                return;
            }
            
            const slot = itemData.slot;
            // Если в слоте уже есть предмет, снимаем его обратно в инвентарь
            if (equipped[slot]) {
                const oldItemId = equipped[slot];
                const existingIndex = inventory.findIndex(i => i.id === oldItemId);
                if (existingIndex !== -1) {
                    inventory[existingIndex].count++;
                } else {
                    inventory.push({ id: oldItemId, count: 1 });
                }
            }
            
            // Надеваем новый предмет
            equipped[slot] = itemId;
            // Убираем предмет из инвентаря
            if (inventory[itemIndex].count === 1) {
                inventory.splice(itemIndex, 1);
            } else {
                inventory[itemIndex].count--;
            }
            
            await saveGameData();
            recalcColdFromEquipment();
            renderItemsTab();
            renderEquipmentTab();
            showMessage(`👕 Вы надели ${itemData.name}`, "#4caf50");
        }
        
        // Снять предмет
        async function unequipItem(slot) {
            const itemId = equipped[slot];
            if (!itemId) return;
            
            const itemData = itemsDB[itemId];
            // Добавляем обратно в инвентарь
            const existingIndex = inventory.findIndex(i => i.id === itemId);
            if (existingIndex !== -1) {
                inventory[existingIndex].count++;
            } else {
                inventory.push({ id: itemId, count: 1 });
            }
            
            equipped[slot] = null;
            await saveGameData();
            recalcColdFromEquipment();
            renderItemsTab();
            renderEquipmentTab();
            showMessage(`🧥 Вы сняли ${itemData.name}`, "#6c757d");
        }

        // Рендер вкладки "Вещи"
        function renderItemsTab() {
            const itemsTab = document.getElementById('itemsTab');
            if (!itemsTab) return;
            
            const usableItems = inventory.filter(item => {
                const data = itemsDB[item.id];
                return data && (data.type === 'food' || data.type === 'alcohol' || data.type === 'drug' || data.type === 'medicine' || data.type === 'drink');
            });
            
            const equipableItems = inventory.filter(item => {
                const data = itemsDB[item.id];
                return data && data.type === 'clothes';
            });
            
            if (usableItems.length === 0 && equipableItems.length === 0) {
                itemsTab.innerHTML = '<p style="text-align:center;">🧺 Инвентарь пуст</p>';
                return;
            }
            
            let html = '';
            if (usableItems.length > 0) {
                html += '<div style="margin-bottom: 8px;"><strong>📦 Расходуемые предметы</strong></div>';
                for (let item of usableItems) {
                    const data = itemsDB[item.id];
                    html += `
                        <div class="inventory-item">
                            <div class="item-info">
                                <span class="item-icon">${data.icon}</span>
                                <span class="item-name">${data.name}</span>
                                <span class="item-count">×${item.count}</span>
                            </div>
                            <button class="use-btn" data-id="${item.id}">Использовать</button>
                        </div>
                    `;
                }
            }
            if (equipableItems.length > 0) {
                html += '<div style="margin-bottom: 8px; margin-top: 12px;"><strong>👔 Одежда</strong></div>';
                for (let item of equipableItems) {
                    const data = itemsDB[item.id];
                    html += `
                        <div class="inventory-item">
                            <div class="item-info">
                                <span class="item-icon">${data.icon}</span>
                                <span class="item-name">${data.name}</span>
                                <span class="item-count">×${item.count}</span>
                            </div>
                            <button class="equip-btn" data-id="${item.id}">Надеть</button>
                        </div>
                    `;
                }
            }
            itemsTab.innerHTML = html;
            
            document.querySelectorAll('.use-btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    await useItem(btn.dataset.id);
                });
            });
            document.querySelectorAll('.equip-btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    await equipItem(btn.dataset.id);
                });
            });
        }
        
        // Рендер вкладки "Экипировка"
        function renderEquipmentTab() {
            const equipmentTab = document.getElementById('equipmentTab');
            if (!equipmentTab) return;
            
            const slots = [
                { key: 'head', name: 'Головной убор', icon: '🧢' },
                { key: 'body', name: 'Верх', icon: '🧥' },
                { key: 'legs', name: 'Штаны', icon: '👖' },
                { key: 'feet', name: 'Обувь', icon: '👢' }
            ];
            
            let html = '';
            for (let slot of slots) {
                const itemId = equipped[slot.key];
                const itemData = itemId ? itemsDB[itemId] : null;
                html += `
                    <div class="slot">
                        <div class="slot-info">
                            <span class="slot-icon">${slot.icon}</span>
                            <span class="slot-name">${slot.name}</span>
                            ${itemData ? `<span class="item-name">${itemData.name}</span>` : `<span class="slot-empty">— пусто —</span>`}
                        </div>
                        ${itemData ? `<button class="unequip-btn" data-slot="${slot.key}">Снять</button>` : ''}
                    </div>
                `;
            }
            equipmentTab.innerHTML = html;
            
            document.querySelectorAll('.unequip-btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    await unequipItem(btn.dataset.slot);
                });
            });
        }

        // Переключение вкладок в модальном окне
        function initModalTabs() {
            const tabs = document.querySelectorAll('.tab-btn');
            const itemsTab = document.getElementById('itemsTab');
            const equipmentTab = document.getElementById('equipmentTab');
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    if (tab.dataset.tab === 'items') {
                        itemsTab.style.display = 'flex';
                        equipmentTab.style.display = 'none';
                        renderItemsTab();
                    } else {
                        itemsTab.style.display = 'none';
                        equipmentTab.style.display = 'flex';
                        renderEquipmentTab();
                    }
                });
            });
        }

        // ========== Авторизация ==========
        async function saveUserNickOnRegister(userId, email, nick) {
            const userDocRef = doc(db, 'users', userId);
            await setDoc(userDocRef, { 
                displayName: nick, 
                userEmail: email,
                health: 100,
                hunger: 100,
                cold: 100,
                money: 200,
                inventory: [
                    { id: "bread", count: 2 },
                    { id: "vodka", count: 1 },
                    { id: "cigarettes", count: 1 },
                    { id: "medkit", count: 1 },
                    { id: "ushanka", count: 1 },
                    { id: "puhovik", count: 1 }
                ],
                equipped: { head: null, body: null, legs: null, feet: null }
            }, { merge: true });
            if (auth.currentUser) {
                await updateProfile(auth.currentUser, { displayName: nick });
            }
        }

        showRegisterLink.addEventListener('click', (e) => {
            e.preventDefault();
            loginFormDiv.style.display = 'none';
            registerFormDiv.style.display = 'block';
            authError.innerText = '';
            regError.innerText = '';
        });
        showLoginLink.addEventListener('click', (e) => {
            e.preventDefault();
            registerFormDiv.style.display = 'none';
            loginFormDiv.style.display = 'block';
            authError.innerText = '';
            regError.innerText = '';
        });

        document.getElementById('loginBtn').addEventListener('click', async () => {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            authError.innerText = '';
            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) {
                authError.innerText = error.message;
            }
        });
        document.getElementById('registerBtn').addEventListener('click', async () => {
            const nick = document.getElementById('regNick').value.trim();
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            regError.innerText = '';
            if (!nick) {
                regError.innerText = 'Введите игровой ник';
                return;
            }
            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const userId = userCredential.user.uid;
                await saveUserNickOnRegister(userId, email, nick);
                await updateProfile(auth.currentUser, { displayName: nick });
                showMessage('Регистрация успешна!', '#4caf50');
            } catch (error) {
                regError.innerText = error.message;
            }
        });

        logoutMenuBtn.addEventListener('click', async () => {
            await signOut(auth);
        });

        // Модальные окна
        const inventoryModal = document.getElementById('inventoryModal');
        const mapModal = document.getElementById('mapModal');
        inventoryBtn.addEventListener('click', () => {
            renderItemsTab();
            renderEquipmentTab();
            inventoryModal.style.display = 'flex';
        });
        document.getElementById('mapBtn').addEventListener('click', () => { mapModal.style.display = 'flex'; });
        document.querySelectorAll('.close-modal').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.target.closest('.modal').style.display = 'none';
            });
        });

        // Тема
        function initTheme() {
            const saved = localStorage.getItem('rpgTheme');
            if (saved === 'light') document.body.classList.add('light-theme');
            else document.body.classList.remove('light-theme');
        }
        function toggleTheme() {
            document.body.classList.toggle('light-theme');
            const isLight = document.body.classList.contains('light-theme');
            localStorage.setItem('rpgTheme', isLight ? 'light' : 'dark');
        }
        themeToggle.addEventListener('click', toggleTheme);

        // Обработка состояния авторизации
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                authContainer.style.display = 'none';
                gameContainer.style.display = 'block';
                const nick = user.displayName || 'Игрок';
                playerNickSpan.innerText = nick;
                await loadGameData(user.uid);
                initModalTabs();
            } else {
                gameContainer.style.display = 'none';
                authContainer.style.display = 'block';
                loginFormDiv.style.display = 'block';
                registerFormDiv.style.display = 'none';
                authError.innerText = '';
                regError.innerText = '';
                document.getElementById('loginEmail').value = '';
                document.getElementById('loginPassword').value = '';
                document.getElementById('regNick').value = '';
                document.getElementById('regEmail').value = '';
                document.getElementById('regPassword').value = '';
                currentUserId = null;
            }
        });

        initTheme();
        updateUI();
    </script>
</body>
</html>
